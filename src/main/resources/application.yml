spring:
  application:
    name: ai-web-generator-backend
  # session 配置
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yu_ai_code_mother
    username: root
    password: 123456
  # redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      ttl: 3600 # 缓存过期时间（秒）
  profiles:
    active: local
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.killuayz.aicode.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
# AI（统一使用 Ollama 部署的 qwen3:30b）
langchain4j:
  open-ai:
    chat-model:
      base-url: http://10.10.21.30:11434/v1
      api-key: ollama
      model-name: qwen3:30b
      max-tokens: 32768
      log-requests: true
      log-responses: true
      max-retries: 3
    streaming-chat-model:
      base-url: http://10.10.21.30:11434/v1
      api-key: ollama
      model-name: qwen3:30b
      max-tokens: 32768
      log-requests: true
      log-responses: true
    # 推理 AI 模型配置（用于复杂的推理任务）
    reasoning-streaming-chat-model:
      base-url: http://10.10.21.30:11434/v1
      api-key: ollama
      model-name: qwen3:30b
      max-tokens: 32768
      temperature: 0.1
      log-requests: true
      log-responses: true
    # 智能路由 AI 模型配置（用于简单的分类任务）
    # 使用 qwen3 推理模型时需预留足够 token：先输出 reasoning 再输出 content 中的枚举值
    routing-chat-model:
      base-url: http://10.10.21.30:11434/v1
      api-key: ollama
      model-name: qwen3:30b
      max-tokens: 32768
      log-requests: true
      log-responses: true
# 添加 COS 对象存储配置（需要从腾讯云获取）
cos:
  client:
    host: your-custom-domain.com
    secretId: your-secret-id
    secretKey: your-secret-key
    region: ap-shanghai
    bucket: your-bucket-name
# Pexels 图片搜索配置
pexels:
  api-key: yRAYdU3qNNTlvsaRTR5hOJWjxI7Zd8nlSWZH7GZmHwp2Hdn3VHLrgxIu
# 阿里云 DashScope 配置
dashscope:
  api-key: sk-4939cc6bfdb64e199c3dc54f0498d127
  image-model: wan2.2-t2i-flash
# 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always