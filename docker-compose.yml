version: '3.8'

services:
  mysql:
    image: mysql:latest
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456  # 请根据需求修改 root 密码
      MYSQL_DATABASE: yu_ai_code_mother              # 可选：启动时创建的默认数据库
    ports:
      - "3306:3306"

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
